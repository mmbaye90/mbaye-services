<div class="click-capture" [class.show]="isMenuOpen" (click)="closeMenu()"></div>

<nav class="navbar navbar-desctop">
  <div class="position-relative w-100">
    <a class="navbar-brand" href="#" (click)="scrollToSection('home')">Mbaye.</a>
    <a href="/cv.html" class="nav-link-cv" title="Voir le CV">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="16" y1="13" x2="8" y2="13"/>
        <line x1="16" y1="17" x2="8" y2="17"/>
        <polyline points="10 9 9 9 8 9"/>
      </svg>
      <span>CV</span>
    </a>
    <div class="container d-block">
      <span class="phone">{{ portfolioData?.contact?.phone }}</span>
      <span class="email">{{ portfolioData?.contact?.email }}</span>
    </div>
    <button class="toggler" (click)="toggleMenu()" [class.active]="isMenuOpen"
            [attr.aria-label]="isMenuOpen ? 'Close menu' : 'Open menu'">
      <span class="toggler-icon"></span>
      <span class="toggler-icon"></span>
      <span class="toggler-icon"></span>
    </button>
  </div>
</nav>

<nav class="navbar-bottom">
  <div class="social">
    <ul class="social-icons">
      <li *ngFor="let social of portfolioData?.socialMedia">
        <a [href]="social.url" target="_blank" rel="noopener noreferrer"
           [innerHtml]="getSocialIcon(social.icon)">
        </a>
      </li>
    </ul>
  </div>
  <div class="copy">&copy; Mbaye. {{ currentYear }}.</div>
</nav>

<nav class="navbar navbar-mobile" [class.open]="isMenuOpen">
  <svg class="close" (click)="closeMenu()" width="48" height="48" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2">
    <line x1="36" y1="12" x2="12" y2="36"></line>
    <line x1="12" y1="12" x2="36" y2="36"></line>
  </svg>

  <ul class="language">
    <li class="active"><a href="#">ENG</a></li>
    <li><a href="#">FRA</a></li>
    <li><a href="#">GER</a></li>
  </ul>

  <ul class="navbar-nav navbar-nav-mobile">
    <li><a class="nav-link" data-menuanchor="home" href="#home" (click)="scrollToSection('home')">Home</a></li>
    <li><a class="nav-link" data-menuanchor="about" href="#about" (click)="scrollToSection('about')">About</a></li>
    <li><a class="nav-link" data-menuanchor="experience" href="#experience" (click)="scrollToSection('experience')">Experience</a></li>
    <li><a class="nav-link" data-menuanchor="skills" href="#skills" (click)="scrollToSection('skills')">Skills</a></li>
    <li><a class="nav-link" data-menuanchor="projects" href="#projects" (click)="scrollToSection('projects')">Projects</a></li>
    <li><a class="nav-link" data-menuanchor="partners" href="#partners" (click)="scrollToSection('partners')">Partners</a></li>
    <li><a class="nav-link" data-menuanchor="testimonials" href="#testimonials" (click)="scrollToSection('testimonials')">Testimonials</a></li>
    <li><a class="nav-link" data-menuanchor="news" href="#blog" (click)="scrollToSection('blog')">News</a></li>
    <li><a class="nav-link" data-menuanchor="contact" href="#contact" (click)="scrollToSection('contact')">Contact</a></li>
    <li><a class="nav-link" href="/cv.html" (click)="closeMenu()">CV</a></li>
  </ul>

  <div class="navbar-mobile-footer">
    <p>&copy; Mbaye. {{ currentYear }}. All Rights Reserved.</p>
  </div>
</nav>
