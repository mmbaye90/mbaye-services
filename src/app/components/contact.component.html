<section id="contact" class="contact section">
  <div class="intro">
    <div class="scroll-wrap">
      <div class="container">
        <div class="contact-row">
          <div class="contact-info-col">
            <h2 class="text-white">Contact</h2>
            <p class="text-muted">You'll called for yielding male, so lights Stars abundantly, is their.</p>
            <h3 class="contact-address">{{ contactInfo?.address }}</h3>
            <h3 class="contact-phone">{{ contactInfo?.phone }}</h3>
            <p class="contact-email">{{ contactInfo?.email }}</p>
          </div>
          <div class="contact-form-col">
            <h3>Let's grab a coffee and jump on conversation <span class="text-primary">chat with me.</span></h3>
            <form #contactForm="ngForm" (ngSubmit)="onSubmit()" class="contact-form">
              <div class="form-group">
                <input type="text" name="name" class="form-control" placeholder="Name"
                       [(ngModel)]="formData.name" required>
              </div>
              <div class="form-group">
                <input type="email" name="email" class="form-control" placeholder="Email *"
                       [(ngModel)]="formData.email" required>
              </div>
              <div class="form-group">
                <textarea rows="3" name="message" class="form-control" placeholder="Message"
                          [(ngModel)]="formData.message" required></textarea>
              </div>
              <div class="form-group">
                <button type="submit" class="btn" [disabled]="loading || contactForm.invalid">
                  {{ loading ? 'Sending...' : 'Contact me' }}
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
