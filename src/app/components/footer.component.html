<footer class="footer">
  <div class="footer-content">
    <div class="container">
      <div class="footer-main">
        <div class="footer-section">
          <ul class="social-links">
            <li *ngFor="let social of portfolioData?.socialMedia">
              <a [href]="social.url" target="_blank" rel="noopener noreferrer"
                 [innerHtml]="getSocialIcon(social.icon)">
              </a>
            </li>
          </ul>
        </div>

        <div class="footer-section">
          <p>&copy; Mbaye. {{ currentYear }}. {{ 'footer.rights' | translate }}</p>
        </div>
      </div>

      <div class="footer-languages">
        <ul>
          <li [class.active]="currentLang === 'en'"><a href="#" (click)="$event.preventDefault(); switchLanguage('en')">ENG</a></li>
          <li [class.active]="currentLang === 'fr'"><a href="#" (click)="$event.preventDefault(); switchLanguage('fr')">FRA</a></li>
        </ul>
      </div>
    </div>
  </div>
</footer>
